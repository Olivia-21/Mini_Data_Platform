version: "3.9"

# ---------------------------------------------------------------------------
# Shared Airflow configuration (YAML anchor, not a real service)
# ---------------------------------------------------------------------------
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mdp_user:mdp_pass@mdp_postgres:5432/mdp_db
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__CORE__REMOTE_LOGGING: "False"
    AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "False"
    AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com
    AIRFLOW__SMTP__SMTP_PORT: 587
    AIRFLOW__SMTP__SMTP_STARTTLS: "True"
    AIRFLOW__SMTP__SMTP_USER: dosimeyolivia98@gmail.com
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-YOUR_APP_PASSWORD_HERE}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: dosimeyolivia98@gmail.com
    _PIP_ADDITIONAL_REQUIREMENTS: "faker minio psycopg2-binary"
    PYTHONPATH: "/opt/airflow:/opt/airflow/src"
  user: "50000:50000"
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_started
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./scripts:/opt/airflow/scripts

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --- PostgreSQL -----------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: mdp_postgres
    environment:
      POSTGRES_USER: mdp_user
      POSTGRES_PASSWORD: mdp_pass
      POSTGRES_DB: mdp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mdp_user -d mdp_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO ----------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: mdp_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Metabase -------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: mdp_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      - postgres
    volumes:
      - metabase_data:/metabase-data

  # --- Airflow: database migrations -----------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: mdp_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username mdp-airflow \
          --password mdp-pass \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email dosimeyolivia98@gmail.com || true
    restart: "no"

  # --- Airflow: webserver ---------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: mdp_airflow_webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # --- Airflow: scheduler ---------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: mdp_airflow_scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  minio_data:
  metabase_data:
